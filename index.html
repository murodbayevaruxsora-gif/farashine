<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Farangiz Eshmurodova — Ma'lumotnoma</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,500&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#FBF7F0;
    --ink:#23202B;
    --plum:#5B3A66;
    --coral:#FF6F5E;
    --mint:#3FBF8F;
    --gold:#E8A638;
    --line: rgba(35,32,43,0.12);
  }

  *{box-sizing:border-box; margin:0; padding:0;}

  body{
    background:var(--paper);
    color:var(--ink);
    font-family:'Space Grotesk', sans-serif;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:40px 20px;
    position:relative;
    overflow-x:hidden;
  }

  /* faint code-grid texture */
  body::before{
    content:"";
    position:fixed;
    inset:0;
    background-image:
      linear-gradient(var(--line) 1px, transparent 1px),
      linear-gradient(90deg, var(--line) 1px, transparent 1px);
    background-size: 42px 42px;
    opacity:0.35;
    pointer-events:none;
  }

  .card{
    position:relative;
    width:100%;
    max-width:620px;
    background:#fff;
    border:1.5px solid var(--ink);
    border-radius:28px;
    padding:56px 48px 44px;
    box-shadow: 10px 10px 0 var(--plum);
    animation: rise 0.7s cubic-bezier(.2,.8,.2,1) both;
  }

  @keyframes rise{
    from{ opacity:0; transform: translateY(18px); }
    to{ opacity:1; transform: translateY(0); }
  }

  .eyebrow{
    font-family:'JetBrains Mono', monospace;
    font-size:13px;
    letter-spacing:0.12em;
    text-transform:uppercase;
    color:var(--plum);
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:28px;
  }

  .eyebrow .dot{
    width:8px;height:8px;border-radius:50%;
    background:var(--coral);
    box-shadow: 16px 0 0 var(--gold), 32px 0 0 var(--mint);
  }

  .eyebrow span.txt{ margin-left:30px; }

  .name-block{ margin-bottom:36px; }

  .label{
    font-family:'JetBrains Mono', monospace;
    font-size:12px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    color: rgba(35,32,43,0.5);
    margin-bottom:6px;
  }

  .firstname{
    font-family:'Fraunces', serif;
    font-style:italic;
    font-weight:500;
    font-size:clamp(40px, 9vw, 64px);
    line-height:0.95;
    color:var(--coral);
    letter-spacing:-0.01em;
  }

  .lastname{
    font-family:'Fraunces', serif;
    font-weight:700;
    font-size:clamp(30px, 6vw, 42px);
    line-height:1;
    color:var(--ink);
    margin-top:4px;
  }

  .underline-deco{
    width:120px;
    height:4px;
    border-radius:4px;
    background: linear-gradient(90deg, var(--coral), var(--gold), var(--mint));
    margin-top:18px;
  }

  .info-grid{
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap:20px 24px;
    margin-top:34px;
    padding-top:30px;
    border-top:1.5px dashed var(--line);
  }

  .info-item{
    display:flex;
    flex-direction:column;
    gap:4px;
  }

  .info-item .k{
    font-family:'JetBrains Mono', monospace;
    font-size:11px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    color: rgba(35,32,43,0.45);
  }

  .info-item .v{
    font-size:18px;
    font-weight:600;
    color:var(--ink);
  }

  .full-span{ grid-column: 1 / -1; }

  .skill-tag{
    display:inline-flex;
    align-items:center;
    gap:8px;
    margin-top:8px;
    padding:9px 16px;
    border:1.5px solid var(--ink);
    border-radius:999px;
    font-family:'JetBrains Mono', monospace;
    font-size:13px;
    font-weight:500;
    background: var(--mint);
    color:#fff;
    width:fit-content;
  }

  .skill-tag::before{
    content:"</>";
    font-weight:700;
  }

  .footer-row{
    margin-top:38px;
    padding-top:18px;
    border-top:1.5px solid var(--ink);
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-family:'JetBrains Mono', monospace;
    font-size:11px;
    letter-spacing:0.06em;
    text-transform:uppercase;
    color: rgba(35,32,43,0.55);
  }

  .badge{
    width:46px;height:46px;
    border-radius:50%;
    background:var(--plum);
    display:flex;align-items:center;justify-content:center;
    color:#fff;
    font-family:'Fraunces', serif;
    font-weight:700;
    font-size:18px;
    flex-shrink:0;
  }

  @media (max-width:480px){
    .card{ padding:40px 26px 32px; }
    .info-grid{ grid-template-columns: 1fr; }
  }

  @media (prefers-reduced-motion: reduce){
    .card{ animation:none; }
  }
</style>
</head>
<body>

  <div class="card">
    <div class="eyebrow">
      <span class="dot"></span>
      <span class="txt">Shaxsiy ma'lumotnoma</span>
    </div>

    <div class="name-block">
      <div class="label">Ism</div>
      <div class="firstname">Farangiz</div>
      <div class="label" style="margin-top:14px;">Familiya</div>
      <div class="lastname">Eshmurodova</div>
      <div class="underline-deco"></div>
    </div>

    <div class="info-grid">
      <div class="info-item">
        <div class="k">Tug'ilgan yili</div>
        <div class="v">2012</div>
      </div>
      <div class="info-item">
        <div class="k">Tug'ilgan kuni</div>
        <div class="v">27-sentabr</div>
      </div>
      <div class="info-item full-span">
        <div class="k">Shug'ullanishi</div>
        <div class="skill-tag">Dasturlashni o'rganmoqda</div>
      </div>
    </div>

    <div class="footer-row">
      <span>Yosh dasturchi</span>
      <div class="badge">FE</div>
    </div>
  </div>

</body>
</html>
